name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  # Re-run on workflow file edits so changes to CI itself are validated
  workflow_dispatch: {}

# Cancel in-progress runs on the same branch when new commits arrive
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  # Disable LiteLLM and HF Hub network calls / interactive prompts during tests
  ANTHROPIC_API_KEY: "fake-key-for-tests"
  OPENAI_API_KEY: "fake-key-for-tests"
  HF_HUB_DISABLE_TELEMETRY: "1"
  PYTHONDONTWRITEBYTECODE: "1"
  # Force ruff / rich into plain mode in CI
  NO_COLOR: "1"
  CI: "1"

jobs:
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7.0.0

      - name: Set up uv
        uses: astral-sh/setup-uv@v8.3.0
        with:
          enable-cache: true
          # Pin a Python for the lint job — ruff itself doesn't care, this just
          # avoids re-resolving every run.
          python-version: "3.12"

      - name: Install dev dependencies
        run: uv sync --group dev --frozen

      - name: ruff check
        run: uv run ruff check .

      - name: ruff format --check
        run: uv run ruff format --check .

  test:
    name: Tests (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13", "3.14"]
    steps:
      - uses: actions/checkout@v7.0.0

      - name: Set up uv
        uses: astral-sh/setup-uv@v8.3.0
        with:
          enable-cache: true
          python-version: ${{ matrix.python-version }}

      - name: Install project + dev dependencies
        run: uv sync --group dev --frozen

      - name: Run pytest
        run: uv run pytest -q

  build:
    name: Build sdist + wheel
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v7.0.0

      - name: Set up uv
        uses: astral-sh/setup-uv@v8.3.0
        with:
          enable-cache: true
          python-version: "3.12"

      - name: Build distributions
        run: uv build

      - name: Verify wheel installs cleanly
        run: |
          uv venv /tmp/check-install
          uv pip install --python /tmp/check-install/bin/python dist/*.whl
          /tmp/check-install/bin/repo2rlenv --version

      - name: Upload distribution artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7
        with:
          name: repo2rlenv-dist-${{ github.sha }}
          path: dist/
          retention-days: 7
