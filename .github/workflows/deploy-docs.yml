name: Deploy docs to GitHub Pages

on:
  push:
    branches:
      - main
    paths:
      - docs/**
      - mkdocs.yml
      - requirements-docs.txt
      - .github/workflows/deploy-docs.yml
  workflow_dispatch:

# Cancel any in-progress deploy when a new one starts.
concurrency:
  group: docs-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@fbc6f3992d24b796d5a048ff273f7fcc4a7b6c09  # v5
        with:
          # git-revision-date-localized needs the full history
          fetch-depth: 0

      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install docs deps
        run: pip install -r requirements-docs.txt

      - name: Build MkDocs site
        # Non-strict: some draft RFCs link to future pipeline docs that
        # don't exist yet — warnings, not errors. Will tighten to
        # `--strict` once every RFC has a shipped pipeline doc.
        run: mkdocs build --verbose

      - name: Upload artifact
        uses: actions/upload-pages-artifact@56afc609e74202658d3ffba0e8f6dda462b719fa  # v3
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e  # v4
