# v0.8.1 bootstrap robustness matrix — difficulty-routed.
#
# One model per repo, chosen by anticipated bootstrap difficulty:
#   easy   → qwen3-coder (free via HF/Together — clean, conventional layouts)
#   medium → sonnet-4-6  (known-good baseline — moderate complexity)
#   hard   → opus-4-7    (large monorepos, multi-service apps, novel toolchains)
#   hard   → gpt-5.5     (parallel hard-tier sample for cross-LLM signal)
#
# If a cell fails, retry with the next tier up via:
#   `--rerun owner/repo` then edit this file to bump the tier.
# Cross-LLM regression on Tier-0 baselines happens in a follow-up sprint.

concurrency: 5
budget:
  max_iterations: 25
  max_seconds: 1800           # 30 min per bootstrap
  max_llm_spend_usd: 2.0      # hard cap per cell

results_path: plans/v0.8.1_bootstrap_results.md
state_path: plans/v0.8.1_bootstrap_state.json
log_dir: plans/v0.8.1_bootstrap_log

models:
  qwen3-coder:
    provider: huggingface
    model: Qwen/Qwen3-Coder-480B-A35B-Instruct:together
  sonnet-4-6:
    provider: anthropic
    model: claude-sonnet-4-6
  opus-4-7:
    provider: anthropic
    model: claude-opus-4-7
  gpt-5.5:
    provider: openai
    model: gpt-5.5

tiers:
  - name: Easy — clean libs / well-known layouts
    model: qwen3-coder
    language_note: mixed
    repos:
      - pallets/click                  # Python CLI lib (already-verified baseline)
      - python-jsonschema/jsonschema   # small Python validator
      - psf/black                      # single-tool Python
      - fastapi/typer                  # small Python lib
      - psf/requests                   # well-known Python HTTP client
      - gorilla/mux                    # small Go router
      - urfave/cli                     # Go CLI (already-verified baseline)
      - spf13/cobra                    # clean Go CLI lib
      - chalk/chalk                    # tiny Node lib
      - serde-rs/json                  # clean Rust crate
      - clap-rs/clap                   # Rust CLI parser
      - sharkdp/bat                    # Rust CLI
      - sharkdp/fd                     # Rust CLI

  - name: Medium — moderate complexity / known gotchas
    model: sonnet-4-6
    language_note: mixed
    repos:
      - python-jsonschema/jsonschema   # promoted from Easy: hatch-vcs + shallow-clone gotcha
      - pallets/werkzeug               # xprocess test-dep gotcha (already-verified)
      - pydantic/pydantic              # compiled core extension
      - Textualize/textual             # async TUI framework
      - fastapi/fastapi                # many extras
      - httpie/cli                     # CLI app
      - pre-commit/pre-commit          # self-installs hooks
      - charmbracelet/bubbletea        # Go TUI
      - gofiber/fiber                  # bigger Go HTTP framework
      - expressjs/express              # Node + mocha (not jest)
      - prettier/prettier              # big Node formatter
      - BurntSushi/ripgrep             # build-heavy Rust
      - starship/starship              # Rust w/ many features
      - evanw/esbuild                  # large Go bundler
      - wagoodman/dive                 # Go TUI

  - name: Hard — full apps / complex deps (Opus)
    model: opus-4-7
    language_note: mixed
    repos:
      - paperless-ngx/paperless-ngx    # Django + OCR + workers
      - mealie-recipes/mealie          # FastAPI + frontend + DB
      - open-webui/open-webui          # LLM UI, heavy deps
      - actualbudget/actual            # full-stack budget app
      - sveltejs/svelte                # compiler + monorepo
      - cli/cli                        # GitHub CLI (gh) — complex Go

  - name: Hard — full apps / complex deps (GPT-5.5)
    model: gpt-5.5
    language_note: mixed
    repos:
      - Mintplex-Labs/anything-llm     # full local LLM stack
      - usebruno/bruno                 # API client (large)
      - vitejs/vite                    # monorepo build tool
      - pocketbase/pocketbase          # Go BaaS
      - nushell/nushell                # large Rust shell

  - name: Stretch — heaviest / riskiest (Opus)
    model: opus-4-7
    language_note: mixed
    repos:
      - astral-sh/uv                   # Rust package manager
      - astral-sh/ruff                 # Rust + Python bindings
      - immich-app/immich              # huge full-stack
      - sst/opencode                   # opencode (was anomalyco/opencode)
